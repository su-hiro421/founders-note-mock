 .page-wrap{max-width:760px;margin:0 auto;padding:44px 20px 60px}
 .page-wrap h1.serif{font-size:28px;border-bottom:3px solid #1f6feb;padding-bottom:10px;margin:0 0 6px}

 .cform{display:grid;gap:16px}
 .cform label{font-size:14px;font-weight:700;color:#333;display:block;margin-bottom:6px}
 .cform .req{color:#c00;font-size:12px;margin-left:4px}
 .cform input,.cform select,.cform textarea{width:100%;padding:11px 13px;border:1px solid #cfcabf;border-radius:8px;font-size:15px;font-family:inherit;box-sizing:border-box;background:#fff}
 .cform textarea{min-height:130px;resize:vertical}
 .cform .submit{background:#1f6feb;color:#fff;border:none;border-radius:8px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;width:auto;justify-self:start;padding-left:40px;padding-right:40px}
 .op-table{width:100%;border-collapse:collapse;font-size:15px;background:#fff}
 .op-table th,.op-table td{border:1px solid #e0dacf;padding:14px 16px;text-align:left;vertical-align:top}
 .op-table th{background:#f4f2ec;width:32%;white-space:nowrap;font-weight:700}
 .note{color:#888;font-size:13px;margin-top:22px;background:#faf9f6;border:1px solid #eae6db;border-radius:8px;padding:10px 14px}
</style>

<main>
<div class="page-wrap">
  <h1 class="serif">お問い合わせ</h1>
  <p class="lead">掲載のご相談・取材のご依頼・その他のお問い合わせは、以下のフォームよりお送りください。担当者より折り返しご連絡いたします。</p>
  <form class="cform" onsubmit="return false;">
    <div><label>お問い合わせ種別<span class="req">必須</span></label>
      <select><option>掲載のご相談</option><option>取材のご依頼</option><option>その他のお問い合わせ</option></select></div>
    <div><label>会社名<span class="req">必須</span></label><input type="text" placeholder="株式会社〇〇"></div>
    <div><label>お名前<span class="req">必須</span></label><input type="text" placeholder="山田 太郎"></div>
    <div><label>メールアドレス<span class="req">必須</span></label><input type="email" placeholder="you@example.com"></div>
    <div><label>電話番号</label><input type="tel" placeholder="03-0000-0000"></div>
    <div><label>お問い合わせ内容<span class="req">必須</span></label><textarea placeholder="ご相談内容をご記入ください"></textarea></div>
    <button type="submit" class="submit">送信する</button>
  </form>
  <p class="note">※これは仮モックです。送信機能は未実装です（本番実装時に送信先・自動返信を設定します）。</p>
</div></main>
